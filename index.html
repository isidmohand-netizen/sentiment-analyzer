<!DOCTYPE html>
<html lang="en">
<head>
  <title>Sentiment Analyzer</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container { width: 100%; max-width: 580px; padding: 2rem 1rem; }

    .header { margin-bottom: 2rem; text-align: center; }
    .header h1 { font-size: 28px; font-weight: 600; color: #1e40af; }
    .header p { font-size: 13px; color: #64748b; margin-top: 6px; }

    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 1.5rem;
    }

    textarea {
      width: 100%; height: 120px; padding: 12px;
      font-family: 'Inter', sans-serif; font-size: 14px;
      color: #0f172a; background: #f8fafc;
      border: 1px solid #e2e8f0; border-radius: 10px; resize: vertical;
    }
    textarea:focus { outline: none; border-color: #1e40af; }

    button {
      width: 100%; margin-top: 12px; padding: 11px;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
      color: white; background-color: #1e40af;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background-color: #1d3a9e; }
    button:disabled { background-color: #94a3b8; cursor: not-allowed; }

    .hidden { display: none; }

    .result {
      margin-top: 1rem; padding: 1rem; border-radius: 10px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result.positive { background: #f0fdf4; border: 1px solid #86efac; }
    .result.negative { background: #fef2f2; border: 1px solid #fca5a5; }

    .result-label { font-size: 18px; font-weight: 600; }
    .result.positive .result-label { color: #15803d; }
    .result.negative .result-label { color: #dc2626; }

    .result-sub { font-size: 13px; margin-top: 4px; }
    .result.positive .result-sub { color: #16a34a; }
    .result.negative .result-sub { color: #ef4444; }

    .progress-bar {
      margin-top: 10px; height: 6px;
      background: rgba(0,0,0,0.08); border-radius: 3px; overflow: hidden;
    }
    .progress-fill { height: 100%; width: 0%; border-radius: 3px; transition: width 0.5s ease; }
    .result.positive .progress-fill { background: #16a34a; }
    .result.negative .progress-fill { background: #dc2626; }

    .footer { margin-top: 1.5rem; text-align: right; font-size: 12px; color: #94a3b8; }
    .footer span { color: #1e40af; font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>Sentiment Analyzer</h1>
      <p>ML-powered movie review classifier TF-IDF + Logistic Regression</p>
    </div>

    <!-- Card -->
    <div class="card">
      <textarea id="userText" placeholder="Type a movie review... e.g. 'This film was absolutely incredible!'"></textarea>
      <button id="btn" onclick="analyzeText()">Analyze sentiment</button>

      <!-- Result -->
      <div id="result" class="result hidden">
        <div id="result-label" class="result-label"></div>
        <div id="result-sub" class="result-sub"></div>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">Built by <span>Idir Sid</span></div>

  </div>
  <script>
    async function analyzeText() {
      const text = document.getElementById("userText").value.trim();
      if (!text) return;

      const btn = document.getElementById("btn");
      btn.textContent = "Analyzing...";
      btn.disabled = true;

      try {
        const response = await fetch("http://127.0.0.1:8001/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: text })
        });
        const data = await response.json();

        const resultDiv = document.getElementById("result");
        resultDiv.className = "result " + data.label;
        document.getElementById("result-label").textContent =
          data.label === "positive" ? "Positive" : "Negative";
        document.getElementById("result-sub").textContent =
          "Confidence: " + data.confidence + "%";
        setTimeout(() => {
          document.getElementById("progress-fill").style.width = data.confidence + "%";
        }, 50);

      } catch (error) {
        alert("Cannot reach the server. Make sure uvicorn is running.");
      }

      btn.textContent = "Analyze sentiment";
      btn.disabled = false;
    }
  </script>
</body>
</html>
